# ================================================================================
# pytest.ini 환경 설정 및 테스트 통제(Control)의 핵심
# ================================================================================
#
# Q1. pytest.ini 파일은 무슨 역할을 하나요?
# A1. Pytest 프레임워크의 '글로벌 기본 설정'을 담당하는 파일입니다.
#     터미널에서 테스트를 실행할 때마다 `pytest -v -s --alluredir=...` 처럼 긴 옵션을 
#     매번 타이핑하는 것은 매우 비효율적입니다. 이 파일에 기본 동작을 세팅해 두면, 
#     팀원 누구나 그냥 `pytest`라는 명령어 세 글자만 쳐도 동일하고 완벽한 환경에서 테스트가 실행됩니다.
#
# Q2. addopts에 있는 -v, -s, --alluredir 옵션은 각각 무슨 뜻인가요?
# A2. 
#     -v (verbose): 테스트 실행 결과를 요약본이 아닌, 각 케이스별로 상세하게(PASSED/FAILED) 보여줍니다.
#     -s (shortcut for --capture=no): 파이썬 코드 내의 print() 문이나 로거 출력을 터미널 화면에 실시간으로 표시해 줍니다. 디버깅에 필수적입니다.
#     --alluredir: 실행 결과를 바탕으로 시각적인 Allure 리포트를 생성할 원시 데이터(JSON) 저장 경로를 지정합니다.
#
# Q3. markers 블록에 사용할 마커들을 굳이 미리 등록해 두는 이유는 무엇인가요?
# A3. '오타 방지'와 '경고(Warning) 제거'를 위함입니다.
#     코드에 `@pytest.mark.smkoe` 처럼 오타를 냈을 때, 이 등록 리스트가 없다면 Pytest는 오타인지 새로운 마커인지 알 수 없습니다.
#     사전에 마커를 등록해 두면, 등록되지 않은 마커 사용 시 `PytestUnknownMarkWarning`을 발생시켜 
#     휴먼 에러를 즉각적으로 잡아낼 수 있는 견고한 화이트리스트(Whitelist) 역할을 합니다.
# ================================================================================



[pytest]
# =========================================================
# 1. 기본적으로 항상 적용할 옵션들 (-v: 상세 출력, -s: print문 출력, --alluredir: 리포트 저장)
# =========================================================
addopts = -v -s --alluredir=reports/allure-results

# =========================================================
# 2. 테스트를 찾을 기본 경로 지정 (테스트 코드가 위치한 폴더 명시)
# =========================================================
testpaths = tests/api tests/ui

# =========================================================
# 3. 로깅(Logging) 포맷 설정
# =========================================================
# 콘솔 출력(Live Logging) 설정
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 파일 저장용 로깅 포맷 설정은 utils/logger.py 에서 코드로 중앙 통제 관리함
; log_file_level = INFO
; log_file_format = %(asctime)s [%(levelname)s] [%(name)s] %(message)s
; log_file_date_format = %Y-%m-%d %H:%M:%S

# =========================================================
# 4. 커스텀 마커(Markers) 등록 리스트
# =========================================================
markers =
    ui: UI 테스트
    api: API 테스트
    smoke: 핵심 기능 테스트
    regression: 회귀 테스트